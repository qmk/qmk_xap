[package]
name = "xap-specs"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
binrw = "0.11"
bitflags = "1.3"
flate2 = "1.0"
log = "0.4"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
deser-hjson = "2.0"
serde_with = "2"
thiserror = "1.0"
ts-rs = { git = "https://github.com/Aleph-Alpha/ts-rs", branch = "main", features = [
    "serde-compat",
    "uuid-impl",
] }
tera = "1"
uuid = { version = "1.3", features = ["serde", "v4"] }
convert_case = "0.6"
prettyplease = "0.2"
syn = { version = "2.0", features = ["parsing"] }
nu-json = "0.82.0"

[dev-dependencies]
similar-asserts = "1.4"

[build-dependencies]
anyhow = "1.0"
tera = "1"
serde = { version = "1", features = ["derive"] }
